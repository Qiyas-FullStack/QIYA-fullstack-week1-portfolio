<!--Section A;Contact Form-->
<section id="contact-a" class="text-center py-3">
    <div class="container">
    <h2 class="section-title">Contact Me</h2>
    <div class="bottom-line"></div>
    <p class="lead" id="contact-lead">Here is how you Can reach me</p>
      <form id="contactForm" novalidate>
        <div class="text-fields">
          <div class="form-group">
            <input
              type="text"
              id="name"
              name="name"
              class="text-input name-input"
              placeholder="Name"
              required
              autocomplete="name"
              aria-describedby="name-error"
              aria-invalid="false"
            />
            <small class="error-message" id="name-error"></small>
          </div>

          <div class="form-group">
            <input
              type="text"
              id="subject"
              name="subject"
              class="text-input subject-input"
              placeholder="Subject"
              required
              autocomplete="off"
              aria-describedby="subject-error"
              aria-invalid="false"
            />
            <small class="error-message" id="subject-error"></small>
          </div>

          <div class="form-group">
            <input
              type="email"
              id="email"
              name="email"
              class="text-input email-input"
              placeholder="Email Address"
              required
              autocomplete="email"
              aria-describedby="email-error"
              aria-invalid="false"
            />
            <small class="error-message" id="email-error"></small>
          </div>

          <div class="form-group">
            <input
              type="tel"
              id="phone"
              name="phone"
              class="text-input phone-input"
              placeholder="Phone Number"
              autocomplete="tel"
              aria-describedby="phone-error"
              aria-invalid="false"
            />
            <small class="error-message" id="phone-error"></small>
          </div>

          <div class="form-group">
            <textarea
              id="message"
              name="message"
              class="text-input message-input"
              placeholder="Enter Message"
              rows="6"
              required
              aria-describedby="message-error"
              aria-invalid="false"
            ></textarea>
            <small class="error-message" id="message-error"></small>
          </div>
        </div>
        <div id="success-popup" class="popup-overlay" aria-hidden="true" tabindex="-1" style="display:none;">
            <div class="popup-content" tabindex="-1">
                <h2 id="sucess">Message Sent Successfully </h2>
                
                <!-- <a href="index.html" id="popup-back" class="popup-link">← Back to Home</a> -->
            </div>
        </div>
        <button type="submit" class="btn-dark">Submit</button>
        <p id="form-message"></p>
        <script src="js/Validation.js" defer></script>
      </form>
</div>
</section>

</section>
